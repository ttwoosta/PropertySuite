<style>
  html, body { margin: 0; background: var(--surface-page); color: var(--text-body); }
  .dev-top {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 28px; border-bottom: 1px solid var(--border-default);
    background: color-mix(in srgb, var(--surface-card) 82%, transparent);
    backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 10;
  }
  .dev-brand { display: flex; align-items: center; gap: 11px; text-decoration: none; }
  .dev-brand span { font-size: var(--text-lg); font-weight: 700; letter-spacing: -0.02em; color: var(--text-heading); }
  .dev-back {
    display: inline-flex; align-items: center; gap: 7px; text-decoration: none;
    font-size: var(--text-sm); font-weight: 600; color: var(--text-body);
    padding: 8px 14px; border: 1px solid var(--border-default); border-radius: var(--radius-md);
    background: var(--surface-card); transition: border-color var(--dur-base) var(--ease-out), background var(--dur-base) var(--ease-out);
  }
  .dev-back:hover { border-color: var(--border-strong); background: var(--surface-hover); }
  .dev-back i, .dev-back svg { width: 16px; height: 16px; flex: none; }

  .dev-body { max-width: 1120px; margin: 0 auto; padding: 56px 28px 96px; }
  .dev-intro { max-width: 600px; }
  .dev-intro h1 {
    margin: 6px 0 12px; font-size: var(--text-4xl); font-weight: 700;
    letter-spacing: -0.025em; color: var(--text-heading); line-height: 1.08;
  }
  .dev-intro p { margin: 0; font-size: var(--text-lg); color: var(--text-muted); line-height: 1.5; text-wrap: pretty; }

  .dev-stage {
    display: flex; align-items: flex-end; justify-content: center; flex-wrap: wrap;
    gap: 40px; margin-top: 56px;
  }
  @media (max-width: 720px) { .dev-body { padding: 36px 18px 72px; } .dev-stage { gap: 28px; } }
</style>
