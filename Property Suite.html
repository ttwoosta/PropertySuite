<style>
  /* Launcher-specific */
  .launch-top {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 28px; border-bottom: 1px solid var(--border-default);
    background: color-mix(in srgb, var(--surface-card) 82%, transparent);
    backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 10;
  }
  .launch-wrap { container-type: inline-size; container-name: launch; }
  .launch-body { max-width: 920px; margin: 0 auto; padding: 56px 28px 80px; }
  .app-grid { display: grid; gap: 18px; grid-template-columns: 1fr 1fr; margin-top: 28px; }
  .app-grid .span2 { grid-column: 1 / -1; }
  .app-card {
    display: flex; gap: 18px; padding: 24px; text-decoration: none;
    background: var(--surface-card); border: 1px solid var(--border-default);
    border-radius: var(--radius-lg); box-shadow: var(--shadow-xs);
    transition: box-shadow var(--dur-base) var(--ease-out), border-color var(--dur-base) var(--ease-out), transform var(--dur-base) var(--ease-out);
  }
  .app-card:hover { box-shadow: var(--shadow-md); border-color: var(--border-strong); transform: translateY(-2px); }
  .app-card .tile {
    flex: none; width: 52px; height: 52px; border-radius: var(--radius-md);
    display: flex; align-items: center; justify-content: center;
  }
  .app-card .tile span { display: inline-flex; width: 26px; height: 26px; }
  .icon-only { display: none; }
  /* phone: compact 3-col icon grid */
  @container launch (max-width: 639px) {
    .launch-body { padding: 32px 18px 64px; }
    .app-grid { display: none; }
    .icon-only {
      display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; margin-top: 24px;
    }
    .icon-cell {
      display: flex; flex-direction: column; align-items: center; gap: 9px; text-decoration: none;
      padding: 16px 8px; background: var(--surface-card); border: 1px solid var(--border-default);
      border-radius: var(--radius-lg); box-shadow: var(--shadow-xs);
    }
    .icon-cell:active { background: var(--surface-hover); }
    .icon-cell .tile { width: 50px; height: 50px; border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; }
    .icon-cell .tile span { display: inline-flex; width: 25px; height: 25px; }
    .icon-cell .nm { font-size: var(--text-xs); font-weight: 600; color: var(--text-heading); text-align: center; line-height: 1.25; }
  }
</style>
